[toolchain]
package_manager = "npm"

[features]
resolution = true
skip-lint = false

[programs.localnet]
proofkick = "921ys67mT4rn62pg2ZvfkrNoS581bU6u3QJojtBV71Qm"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

# Load the real TxLINE/txoracle program and the daily_scores Merkle-root account
# (both dumped from devnet) into the local validator so verify_outcome's CPI
# replays a real proof against real on-chain state.
[test]
startup_wait = 120000

[[test.genesis]]
address = "6pW64gN1s2uqjHkn1unFeEjAwJkPGHoppGvS715wyP2J"
program = ".localnet/txoracle.so"

[test.validator]
# Agave 4.x panics on the unspecified addr that Anchor passes by default.
bind_address = "127.0.0.1"

[[test.validator.account]]
address = "HYo6qqMUXRaMit2YF6q6YEh5K1mWYBFC3pDZrV2HZN5f"
filename = ".localnet/daily_scores.json"
